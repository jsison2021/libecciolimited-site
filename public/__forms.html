<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify Form Detection</title>
  </head>
  <body>
    <!--
      Static form so Netlify's build-time bot registers the "contact" form.
      The live React form (src/components/ContactForm.tsx) posts to this path.
    -->
    <form
      name="contact"
      data-netlify="true"
      netlify-honeypot="bot-field"
      hidden
    >
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <select name="interest"></select>
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
  </body>
</html>
